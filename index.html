<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NeetCode 150 POTD</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="card">
    <h1>NeetCode 150 - Problem of the Day</h1>

    <section id="potd" class="potd">
      <p class="loading">Loading today's problem...</p>
    </section>

    <p id="todayDate" class="meta"></p>
    <p id="nextRefresh" class="meta"></p>

    <section id="lists" class="lists">
      <div class="listCard">
        <h3 class="listTitle">Revision</h3>
        <div id="revisionList" class="listBody"></div>
      </div>
      <div class="listGrid">
        <div class="listCard">
          <h3 class="listTitle">Important</h3>
          <div id="importantList" class="listBody"></div>
        </div>
        <div class="listCard">
          <h3 class="listTitle">Completed</h3>
          <div id="completedList" class="listBody"></div>
        </div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
